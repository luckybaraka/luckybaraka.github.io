theme: jekyll-theme-chirpy

lang: en
timezone: Africa/Nairobi

title: Lucky Baraka
tagline: Backend Software Engineer

description: >-
  Backend Software Engineer specializing in scalable systems, APIs,
  and modern web technologies. Sharing insights on software engineering,
  system design, and real-world problem solving.

url: "https://luckybaraka.github.io"
baseurl: ""

github:
  username: luckybaraka

twitter:
  username: baraka51553

social:
  name: Lucky Baraka
  email: luckybaraka21@gmail.com
  links:
    - https://github.com/luckybaraka
    - https://www.linkedin.com/in/lucky-baraka/
    - https://x.com/baraka51553

# 🔍 SEO & Verification
webmaster_verifications:
  google:
  bing:

# 📊 Analytics (optional but recommended)
analytics:
  google:
    id: # add later (GA4)
  goatcounter:
    id:

# 🎨 Theme Mode
theme_mode: 

# 🖼️ Branding
avatar: /assets/img/profile.png
social_preview_image: /assets/img/preview.png

# 📚 Table of Contents
toc: true

# 💬 Comments (recommended for blogs)
comments:
  provider: giscus
  giscus: 
    repo: luckybaraka/luckybaraka.github.io
    repo_id: R_kgDOSNLmsg
    category: General
    category_id: DIC_kwDOSNLmss4C8ClD
    mapping: pathname
    input_position: bottom
    lang: en
    reactions_enabled: 1

# ⚡ Performance
cdn:

assets:
  self_host:
    enabled: false

# 📱 Progressive Web App
pwa:
  enabled: true
  cache:
    enabled: true

# 📄 Pagination
paginate: 10

# 🔧 Defaults
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# 🎯 Markdown & Syntax Highlighting
kramdown:
  syntax_highlighter: rouge

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all


jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

exclude:
  - "*.gem"
  - "*.gemspec"
  - README.md
  - LICENSE